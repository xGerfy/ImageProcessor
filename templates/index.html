<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} - Обработка изображений</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .upload-section {
        background: white;
        border-radius: 16px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .upload-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
      }

      .file-input-wrapper input[type="file"] {
        position: absolute;
        left: -9999px;
      }

      .file-input-label {
        display: inline-block;
        padding: 15px 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 8px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        text-align: center;
        font-weight: 500;
      }

      .file-input-label:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      .upload-btn {
        padding: 15px 30px;
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .upload-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
      }

      .upload-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .images-section {
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .images-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .image-card {
        background: #f8f9fa;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }

      .image-card:hover {
        transform: translateY(-5px);
      }

      .image-preview {
        width: 100%;
        height: 200px;
        object-fit: cover;
        background: #e9ecef;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6c757d;
      }

      .image-info {
        padding: 15px;
      }

      .image-filename {
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        word-break: break-all;
      }

      .image-status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 10px;
      }

      .status-pending {
        background: #fff3cd;
        color: #856404;
      }

      .status-processing {
        background: #cce5ff;
        color: #004085;
      }

      .status-completed {
        background: #d4edda;
        color: #155724;
      }

      .status-failed {
        background: #f8d7da;
        color: #721c24;
      }

      .image-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .action-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: opacity 0.2s;
      }

      .action-btn:hover {
        opacity: 0.8;
      }

      .btn-view {
        background: #667eea;
        color: white;
      }

      .btn-download {
        background: #11998e;
        color: white;
      }

      .btn-delete {
        background: #dc3545;
        color: white;
      }

      .processing-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .placeholder {
        text-align: center;
        padding: 40px;
        color: #6c757d;
      }

      .placeholder-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      .progress-bar {
        width: 100%;
        height: 4px;
        background: #e9ecef;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 10px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        width: 0%;
        transition: width 0.3s;
      }

      .type-selector {
        display: flex;
        gap: 5px;
        margin-top: 10px;
      }

      .type-btn {
        padding: 5px 10px;
        border: 1px solid #667eea;
        background: white;
        color: #667eea;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
      }

      .type-btn.active {
        background: #667eea;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🖼️ Image Processor</h1>

      <div class="upload-section">
        <h2 style="margin-bottom: 15px; color: #333">Загрузить изображение</h2>
        <form class="upload-form" id="uploadForm">
          <div class="file-input-wrapper">
            <label for="fileInput" class="file-input-label">
              📁 Выберите файл
            </label>
            <input
              type="file"
              id="fileInput"
              name="file"
              accept="image/jpeg,image/png,image/gif"
              required
            />
          </div>
          <div id="fileName" style="color: #666; font-size: 14px"></div>
          <button type="submit" class="upload-btn" id="uploadBtn">
            📤 Загрузить и обработать
          </button>
        </form>
        <div id="uploadProgress" style="display: none; margin-top: 15px">
          <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
          </div>
          <p style="margin-top: 8px; color: #666">Загрузка...</p>
        </div>
      </div>

      <div class="images-section">
        <h2 style="margin-bottom: 15px; color: #333">Мои изображения</h2>
        <div class="images-grid" id="imagesGrid">
          <div class="placeholder">
            <div class="placeholder-icon">📷</div>
            <p>Здесь появятся ваши загруженные изображения</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "/api";
      let uploadedImages = [];
      let statusUpdateInProgress = {}; // Защита от множественных запросов

      // Элементы формы
      const uploadForm = document.getElementById("uploadForm");
      const fileInput = document.getElementById("fileInput");
      const fileName = document.getElementById("fileName");
      const uploadBtn = document.getElementById("uploadBtn");
      const uploadProgress = document.getElementById("uploadProgress");
      const imagesGrid = document.getElementById("imagesGrid");

      // Отображение имени файла
      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          fileName.textContent = "Выбран: " + e.target.files[0].name;
        }
      });

      // Загрузка файла
      uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);

        uploadBtn.disabled = true;
        uploadProgress.style.display = "block";

        try {
          const response = await fetch(API_BASE + "/upload", {
            method: "POST",
            body: formData,
          });

          const result = await response.json();

          if (response.ok) {
            uploadedImages.unshift({
              id: result.id,
              filename: result.filename,
              status: result.status,
            });
            renderImages();
            fileInput.value = "";
            fileName.textContent = "";
          } else {
            alert("Ошибка: " + result.error);
          }
        } catch (err) {
          alert("Ошибка загрузки: " + err.message);
        } finally {
          uploadBtn.disabled = false;
          uploadProgress.style.display = "none";
        }
      });

      // Рендеринг изображений
      async function renderImages() {
        if (uploadedImages.length === 0) {
          imagesGrid.innerHTML = `
                    <div class="placeholder">
                        <div class="placeholder-icon">📷</div>
                        <p>Здесь появятся ваши загруженные изображения</p>
                    </div>
                `;
          return;
        }

        imagesGrid.innerHTML = uploadedImages
          .map(
            (img) => `
                <div class="image-card" data-id="${img.id}">
                    <img src="/image/${img.id}?type=thumbnail" class="image-preview"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23e9ecef%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%236c757d%22>Обработка...</text></svg>'">
                    <div class="image-info">
                        <div class="image-filename">${escapeHtml(img.filename)}</div>
                        <span class="image-status status-${img.status}">
                            ${img.status === "processing" ? '<span class="processing-spinner"></span>' : ""}
                            ${getStatusText(img.status)}
                        </span>
                        <div class="type-selector">
                            <button class="type-btn active" data-type="thumbnail">Thumbnail</button>
                            <button class="type-btn" data-type="resize">Resize</button>
                            <button class="type-btn" data-type="watermark">Watermark</button>
                        </div>
                        <div class="image-actions" style="margin-top: 10px;">
                            <button class="action-btn btn-view" onclick="viewImage('${img.id}')">👁️ Просмотр</button>
                            <button class="action-btn btn-download" onclick="downloadImage('${img.id}')">⬇️ Скачать</button>
                            <button class="action-btn btn-delete" onclick="deleteImage('${img.id}')">🗑️ Удалить</button>
                        </div>
                    </div>
                </div>
            `,
          )
          .join("");

        // Обработчики кнопок типа
        document.querySelectorAll(".type-selector").forEach((selector) => {
          selector.addEventListener("click", (e) => {
            if (e.target.classList.contains("type-btn")) {
              selector
                .querySelectorAll(".type-btn")
                .forEach((b) => b.classList.remove("active"));
              e.target.classList.add("active");
              const card = selector.closest(".image-card");
              const img = card.querySelector(".image-preview");
              const type = e.target.dataset.type;
              img.src = `/image/${card.dataset.id}?type=${type}`;
            }
          });
        });
      }

      // Обновление статуса изображения
      async function updateImageStatus(id) {
        // Защита от множественных одновременных запросов
        if (statusUpdateInProgress[id]) {
          return;
        }

        try {
          statusUpdateInProgress[id] = true;

          const response = await fetch(API_BASE + "/status/" + id);
          if (response.ok) {
            const status = await response.json();
            const img = uploadedImages.find((i) => i.id === id);
            if (img && img.status !== status.status) {
              img.status = status.status;
              // Перерисовываем только статус, а не все изображения
              updateImageStatusUI(id, status.status);
            } else if (img) {
              // Статус не изменился, но убедимся что UI правильный
              updateImageStatusUI(id, img.status);
            }
          }
        } catch (err) {
          console.error("Failed to update status:", err);
        } finally {
          statusUpdateInProgress[id] = false;
        }
      }

      // Обновление UI статуса для конкретного изображения
      function updateImageStatusUI(id, newStatus) {
        const card = document.querySelector(`[data-id="${id}"]`);
        if (!card) return;

        const statusEl = card.querySelector(".image-status");
        if (!statusEl) return;

        // Полностью пересоздаём HTML статуса
        let statusHtml = "";
        if (newStatus === "processing") {
          statusHtml =
            '<span class="processing-spinner"></span> ' +
            getStatusText(newStatus);
        } else {
          statusHtml = getStatusText(newStatus);
        }

        statusEl.className = `image-status status-${newStatus}`;
        statusEl.innerHTML = statusHtml;

        // Если статус completed - обновляем превью, чтобы показать готовое изображение
        if (newStatus === "completed") {
          const img = card.querySelector(".image-preview");
          if (img) {
            // Принудительно обновляем src с timestamp для сброса кэша
            const newSrc = `/image/${id}?type=thumbnail&t=${Date.now()}`;
            img.src = newSrc;
          }
        }
      }

      // Просмотр изображения
      function viewImage(id) {
        const type =
          document.querySelector(`[data-id="${id}"] .type-btn.active`)?.dataset
            .type || "thumbnail";
        window.open(`/image/${id}?type=${type}`, "_blank");
      }

      // Скачивание изображения
      function downloadImage(id) {
        const type =
          document.querySelector(`[data-id="${id}"] .type-btn.active`)?.dataset
            .type || "thumbnail";
        const a = document.createElement("a");
        a.href = `/image/${id}?type=${type}`;
        a.download = `image_${id}.jpg`;
        a.click();
      }

      // Удаление изображения
      async function deleteImage(id) {
        if (!confirm("Вы уверены, что хотите удалить это изображение?")) return;

        try {
          const response = await fetch(API_BASE + "/image/" + id, {
            method: "DELETE",
          });

          if (response.ok) {
            uploadedImages = uploadedImages.filter((i) => i.id !== id);
            renderImages();
          } else {
            alert("Ошибка удаления");
          }
        } catch (err) {
          alert("Ошибка: " + err.message);
        }
      }

      // Утилита для экранирования HTML
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Текст статуса
      function getStatusText(status) {
        const texts = {
          pending: "В очереди",
          processing: "Обработка...",
          completed: "Готово",
          failed: "Ошибка",
        };
        return texts[status] || status;
      }

      // Периодическое обновление статусов
      setInterval(() => {
        uploadedImages.forEach((img) => {
          if (img.status === "pending" || img.status === "processing") {
            updateImageStatus(img.id);
          }
        });
      }, 2000);
    </script>
  </body>
</html>
